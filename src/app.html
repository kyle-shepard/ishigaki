<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<style>
			/* Theme tokens, global so component-scoped styles can read them via var(). Light is a
			   warm off-white, not the browser's blinding default white. */
			:root {
				--bg: #ebe6db;
				--text: #2b2420;
				--muted: #6b6257;
				--header-bg: #d7cdb8;
				--panel-bg: #f5f1e9;
				--border: rgba(0, 0, 0, 0.15);
			}
			:root[data-theme='dark'] {
				--bg: #1c1a17;
				--text: #e8e3d8;
				--muted: #9a917f;
				--header-bg: #2a2622;
				--panel-bg: #26231f;
				--border: rgba(255, 255, 255, 0.13);
			}
			html,
			body {
				background: var(--bg);
				color: var(--text);
				margin: 0;
			}
		</style>
		<script>
			// Set the theme before first paint so there's no flash of the wrong background.
			// Stored choice wins; otherwise follow the OS preference.
			try {
				var t =
					localStorage.getItem('theme') ||
					(matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
				document.documentElement.dataset.theme = t;
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
